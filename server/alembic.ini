[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# URL is set dynamically in alembic/env.py from .env (PG_* vars)
# This placeholder is overridden at runtime — do not put real credentials here
sqlalchemy.url = postgresql+psycopg2://user:pass@localhost:5433/snk_mes

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
